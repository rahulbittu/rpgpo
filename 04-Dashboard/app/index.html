<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPGPO Dashboard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #0f1115;
      color: #e9edf1;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1, h2, h3 {
      margin-top: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: #171a21;
      border: 1px solid #262b36;
      border-radius: 16px;
      padding: 16px;
    }
    .muted {
      color: #aab3c2;
      font-size: 14px;
    }
    ul {
      padding-left: 18px;
    }
    .section {
      margin-top: 24px;
    }
    .pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #222735;
      color: #cfd8e6;
      font-size: 12px;
      margin-top: 6px;
    }
    code {
      color: #c3e88d;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="systemName">RPGPO Dashboard</h1>
    <p class="muted" id="systemMeta">Loading system state...</p>

    <div class="section grid" id="topCards"></div>

    <div class="section">
      <h2>Missions</h2>
      <div class="grid" id="missions"></div>
    </div>

    <div class="section">
      <h2>Research Queue</h2>
      <div class="card">
        <ul id="researchQueue"></ul>
      </div>
    </div>

    <div class="section">
      <h2>Recent Wins</h2>
      <div class="card">
        <ul id="recentWins"></ul>
      </div>
    </div>
  </div>

  <script>
    async function loadState() {
      const res = await fetch('../state/dashboard-state.json');
      const state = await res.json();

      document.getElementById('systemName').textContent = state.system_name + ' Dashboard';
      document.getElementById('systemMeta').textContent =
        'Primary inbox: ' + state.primary_inbox + ' | Workspace: ' + state.workspace_root;

      const topCards = document.getElementById('topCards');
      topCards.innerHTML = `
        <div class="card">
          <h2>Top Priorities</h2>
          <ul>${state.top_priorities.map(x => `<li>${x}</li>`).join('')}</ul>
        </div>
        <div class="card">
          <h2>Pending Approvals</h2>
          <ul>${state.pending_approvals.map(x => `<li>${x}</li>`).join('')}</ul>
        </div>
        <div class="card">
          <h2>System</h2>
          <p class="muted">Governed private office is active.</p>
          <div class="pill">Flagship: TopRanker</div>
        </div>
      `;

      const missions = document.getElementById('missions');
      missions.innerHTML = state.missions.map(m => `
        <div class="card">
          <h3>${m.name}</h3>
          <p class="muted">Focus: ${m.focus}</p>
          <div class="pill">Status: ${m.status}</div>
          <p style="margin-top: 12px;"><strong>Next:</strong> ${m.next}</p>
        </div>
      `).join('');

      const researchQueue = document.getElementById('researchQueue');
      researchQueue.innerHTML = state.research_queue.map(x => `<li>${x}</li>`).join('');

      const recentWins = document.getElementById('recentWins');
      recentWins.innerHTML = state.recent_wins.map(x => `<li>${x}</li>`).join('');
    }

    loadState().catch(err => {
      document.getElementById('systemMeta').textContent = 'Failed to load dashboard-state.json';
      console.error(err);
    });
  </script>
</body>
</html>
